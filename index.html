    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);

      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; transition: all .2s; }

    .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }

    /* ── Typography ── */
    h1 { font-size: clamp(2.6rem, 6vw, 4.2rem); font-weight: 700; line-height: 1.1; letter-spacing: -.02em; margin-bottom: .5rem; }
    h1 .dim { color: var(--muted); font-weight: 300; }
    h2 { font-size: clamp(1.6rem, 3.5vw, 2.2rem); font-weight: 700; letter-spacing: -.02em; line-height: 1.2; }
    
    /* Consolidated Tag System */
    .caps-tag {

      color: var(--accent);

      margin-bottom: .75rem;
      display: flex;
      align-items: center;

    .caps-tag.hero { color: var(--accent2); font-size: .8rem; margin-bottom: 1.25rem; }
    .caps-tag.hero::before { content: ''; width: 28px; height: 1px; background: var(--accent2); }

    /* ── Components ── */
    .section-header { margin-bottom: 3rem; }
    .section-line { width: 40px; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); margin-top: .75rem; border-radius: 2px; }
    .section-intro { color: var(--muted); max-width: 600px; margin-bottom: 2rem; }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem; padding: .65rem 1.4rem; border-radius: 6px;

    .btn-primary { background: var(--accent); color: #fff; border: none; }
    .btn-primary:hover { background: #0891b2; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

    /* Cards */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all .2s; }
    .card:hover { border-color: var(--accent2); transform: translateY(-2px); }

    /* ── Grids ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .stack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.25rem; }
