  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f7ff;
      --bg-card:   #ffffff;
      --border:    #dde3f5;
      --accent:    #06b6d4;
      --accent2:   #d946ef;
      --text:      #111827;
      --muted:     #6b7280;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; transition: color .2s; }
    a:hover { color: #67e8f9; }

    /* ── Layout ── */
    .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
    section { padding: 6rem 0; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(245, 247, 255, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .02em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: .85rem;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: .05em;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 60px;
      position: relative;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 40%, rgba(6,182,212,.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 70%, rgba(217,70,239,.10) 0%, transparent 70%),
        radial-gradient(ellipse 30% 40% at 50% 10%, rgba(217,70,239,.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Subtle grid */
    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(6,182,212,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-content { position: relative; z-index: 1; }

    .hero-tag {
      font-family: var(--font-mono);
      font-size: .8rem;
      color: var(--accent2);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .hero-tag::before {
      content: '';
      display: inline-block;
      width: 28px; height: 1px;
      background: var(--accent2);
    }

    h1 {
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: .5rem;
    }
    h1 .dim { color: var(--muted); font-weight: 300; }

    .hero-subtitle {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 1.5rem;
      font-family: var(--font-mono);
    }
    .hero-subtitle .accent { color: var(--accent); }

    .hero-desc {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 540px;
      margin-bottom: 2.5rem;
      line-height: 1.8;
    }

    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem 1.4rem;
      border-radius: 6px;
      font-size: .9rem;
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: .02em;
      transition: all .2s;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
    }
    .btn-primary:hover { background: #0891b2; color: #fff; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

    .hero-scroll {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: .7rem;
      letter-spacing: .1em;
      animation: bounce 2s infinite;
    }
    .hero-scroll svg { width: 16px; opacity: .5; }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    .section-header { margin-bottom: 3rem; }

      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: .75rem;
